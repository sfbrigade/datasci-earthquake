repos:
- repo: https://github.com/psf/black
  rev: 24.10.0
  hooks:
  - id: black
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: "v1.13.0"
  hooks:
  - id: mypy
    args: [ "--config-file", "mypy.ini" ]
    additional_dependencies:
    - "pydantic>=2.9.0"
    - "sqlalchemy>=2.0.35"
    - "pydantic-settings>=2.5.2"
    - "fastapi>=0.114.0"
    - "GeoAlchemy2>=0.15.2"
    - "pytest>=8.3.3"
- repo: https://github.com/pre-commit/mirrors-eslint
  rev: "v9.14.0"
  hooks:
  - id: eslint
    args:
    - "--config=eslint.config.js"
    - "--cache"
    - "--ignore-pattern=node_modules/*"
    - "--ignore-pattern=dist/*"
    - "--ignore-pattern=.next/*"
    - "--ignore-pattern=next.config.js"
    entry: pnpm run lint
    language: node
    files: \.[jt]sx?$
    additional_dependencies:
    - "eslint"
    - "eslint-plugin-prettier"
    - "eslint-config-prettier"
    - "prettier"
- repo: https://github.com/pre-commit/mirrors-prettier
  rev: "v3.1.0"
  hooks:
  - id: prettier
    additional_dependencies:
    - "prettier"
    files: \.[jt]sx?$
- repo: local
  hooks:
  - id: check-env-sync
    name: Check .env.example matches Settings
    entry: python -m scripts.check_env_sync
    language: python
    additional_dependencies:
    - pydantic>=2.9.0
    - pydantic-settings>=2.5.2
    pass_filenames: false
    always_run: true
    files: ^(backend/api/config\.py|\.env\.example)$
