repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.13.0"
    hooks:
      - id: mypy
        args: ["--config-file", "mypy.ini"]
        additional_dependencies:
          - "pydantic>=2.9.0"
          - "sqlalchemy>=2.0.35"
          - "pydantic-settings>=2.5.2"
          - "fastapi>=0.114.0"
          - "GeoAlchemy2>=0.15.2"
          - "pytest>=8.3.3"
  - repo: local
    hooks:
      - id: check-env-sync
        name: Check .env.example matches Settings
        entry: python -m scripts.check_env_sync
        language: python
        additional_dependencies:
          - pydantic>=2.9.0
          - pydantic-settings>=2.5.2
        pass_filenames: false
        always_run: true
        files: ^(backend/api/config\.py|\.env\.example)$
      # ESLint hook for Next.js (JS/TS files)
      - id: eslint
        name: ESLint
        entry: npm run lint:fix -w apps/web
        language: node
        types: [file]
        files: \.(js|ts|jsx|tsx|mjs)$
        pass_filenames: false
        # Ensure it runs only in the relevant directory if using a monorepo structure
