name: Deployed API Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [main, develop]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run deployed smoke test
        env:
          SMOKE_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          MIN_SOFT_STORIES_COUNT: "1"
          MIN_TSUNAMI_COUNT: "1"
          MIN_LIQUEFACTION_COUNT: "1"
        run: python scripts/smoke_deployed_api.py