name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.detect.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect markdown-only changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            # handle first push on branch where "before" can be all zeros
            if [[ "$BASE_SHA" =~ ^0+$ ]]; then
              BASE_SHA="$(git rev-list --max-parents=0 HEAD | tail -n1)"
            fi
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}")"

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if [[ -z "$CHANGED_FILES" ]]; then
            # fallback: run full CI if no diff detected
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NON_MD_FILES="$(printf "%s\n" "$CHANGED_FILES" | grep -Ev '(^$|.*\.mdx?$)' || true)"

          if [[ -z "$NON_MD_FILES" ]]; then
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          fi

  eslint:
    if: ${{ github.repository == 'octo-org/octo-repo-prod' }}
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-using-nvmrc
      - name: Install Node.js dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  black_lint_and_mypy_type_check:
    if: ${{ github.repository == 'octo-org/octo-repo-prod' }}
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - name: Install uv
        run: curl -sSL https://astral.sh/uv/install.sh | sh
      - name: Install dependencies with uv
        run: |
          uv pip install --system black==24.10.0 mypy
          uv pip install --system fastapi pydantic pydantic-settings sqlalchemy GeoAlchemy2 pytest
      - name: Check code formatting with black
        run: black --check .
      - name: Type check with mypy
        run: mypy --config-file mypy.ini .

  nextjs_build_check:
    if: ${{ github.repository == 'octo-org/octo-repo-prod' }}
    runs-on: ubuntu-latest
    needs: changes
    env:
      ENVIRONMENT: ci
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-using-nvmrc
      - name: Install dependencies
        run: npm ci
      - name: Check Next.js production build
        run: npm run build

  docker_build_test:
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with: 
          cache: 'npm'

      - name: npm verify BEFORE 
        run: npm cache verify 


      - run: npm config get cache 
      - run: ls -la /home/runner/.npm 

      - name: npm install 
        run: npm install  

      - name: npm verify AFTER
        run: npm cache verify

      - run: ls -la /home/runner/.npm 

      # - run: ls -la /home/node/.npm/_cacache 
 
      - run: pwd && mkdir hahahun

      - run: ls -la /home/runner/work/datasci-earthquake/datasci-earthquake 

      - run: touch hahahahahah.txt 

      - name: Set default fork status
        run: echo "is_fork=false" >> $GITHUB_ENV

      - name: Check if pull request from fork
        if: github.event_name == 'pull_request'
        run: |
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "is_fork=true" >> $GITHUB_ENV
          fi

      - name: Use .env.example for forks
        if: env.is_fork == 'true'
        run: cp .env.example .env

      - name: Get Run ID of Most Recent Successful Run
        if: env.is_fork != 'true'
        run: |
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/sfbrigade/datasci-earthquake/actions/workflows/env_vars.yml/runs?status=completed&conclusion=success")
          run_id=$(echo "$response" | jq '.workflow_runs[0].id')
          echo "Run ID: $run_id"
          echo "run_id=$run_id" >> $GITHUB_ENV

      - name: Download .env Artifact
        if: env.is_fork != 'true'
        uses: actions/download-artifact@v4
        with:
          name: encrypted-env-file
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: sfbrigade/datasci-earthquake
          run-id: ${{ env.run_id }}

      - name: Decrypt .env File
        if: env.is_fork != 'true'
        run: |
          openssl aes-256-cbc -d -salt -pbkdf2 -k "${{ secrets.ARTIFACT_PASS }}" -in .env.enc -out .env
          echo "Decryption complete"

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then
            echo ".env not found. Falling back to .env.example"
            cp .env.example .env
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #- name: Cache Docker DB layers
      #  uses: actions/cache@v4
      #  with:
      #    path: earthquake-cache-db-sing
      #    key: ${{ hashFiles('backend/database/Dockerfile') }}-earthquake-cache-db-sing

      - name: Build Docker Containers
        run: docker compose -f compose.yaml -f compose.ci.yaml build
      
      - run: docker run -d --env-file .env --name mydb --hostname db postgis-custom
      - run: docker run -d --env-file .env --name mydbtest --hostname db_test datasci-earthquake-db_test
      - run: docker run -d --env-file .env --name mybackend datasci-earthquake-backend 
      - run: echo 'right after' && docker ps
      #- run: docker compose -f compose.yaml -f compose.ci.yaml up -d --wait --wait-timeout 300 --no-build db db_test backend
      - run: docker run -d --env-file .env --name myfrontend --mount type=bind,src=/home/runner/work/datasci-earthquake/datasci-earthquake/node_modules,dst=/app/node_modules datasci-earthquake-frontend
      
      - run: echo 'after starting FE' && docker ps
      - run: docker inspect myfrontend
      #- run: docker inspect mybackend
      #- run: docker inspect mydb
      #- run: docker inspect mydbtest

      #- name: Start Services
      #  run: docker compose -f compose.yaml -f compose.ci.yaml up -d --wait --wait-timeout 300

      #- run: docker inspect datasci-earthquake-frontend-1 

      - name: Docker Backend Logs
        if: always()
        run: docker logs mybackend || echo "No logs found"

      #- name: Docker DB Logs
      #  if: always()
      #  run: docker logs my_postgis_db || echo "No logs found"

      #- name: Docker DB Test (unit tests) Logs
      #  if: always()
      #  run: docker logs my_postgis_db_test || echo "No logs found"

      #- name: Docker Frontend Logs
      #  if: always()
      #  run: docker logs datasci-earthquake-frontend-1 || echo "No logs found"

      - run: docker ps

      - name: Run Backend Tests
        run: docker exec mybackend pytest backend/database/tests/ -v

      #- name: Run Frontend Tests
      #  run: docker exec myfrontend npm test

      #- name: Clean Up
      #  run: docker compose -f compose.yaml -f compose.ci.yaml down
