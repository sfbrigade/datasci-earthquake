name: CI Pipeline

on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - develop
      - main
  pull_request:
    paths-ignore:
      - '**.md'
    types: [opened, synchronize, reopened]
    branches:
      - develop
      - main

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-using-nvmrc

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  black_lint_and_mypy_type_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install uv
        run: |
          curl -sSL https://astral.sh/uv/install.sh | sh
          
      - name: Install dependencies with uv
        run: |
          uv pip install --system black==24.10.0 mypy
          uv pip install --system fastapi pydantic pydantic-settings sqlalchemy GeoAlchemy2 pytest

      - name: Check code formatting with black
        run: black --check .

      - name: Type check with mypy
        run: mypy --config-file mypy.ini .

  nextjs_build_check:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ci
    steps:
      - uses: actions/checkout@v4 
      - uses: ./.github/actions/setup-node-using-nvmrc
      - name: Install dependencies
        run: npm ci 
      - name: Check Next.js production build
        run: npm run build

  docker_build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container_name: [my_postgis_db_test, my_postgis_db, datasci-earthquake-backend-1,  datasci-earthquake-frontend-1]
    outputs:
      container_${{ matrix.container_name }}_health: ${{ steps.check_health_${{ matrix.container_name }}.outputs.health }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set default fork status
        run: echo "is_fork=false" >> $GITHUB_ENV        

      - name: Check if pull request from fork
        id: check_fork
        if: github.event_name == 'pull_request'
        run: |
          run: |
            if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
              echo "is_fork=true" >> $GITHUB_ENV
            fi

      - name: Use .env.example for forks
        if: env.is_fork == 'true'
        run: cp .env.example .env

      - name: Get Run ID of Most Recent Successful Run
        id: get_run_id
        if: env.is_fork != 'true'
        run: |
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/sfbrigade/datasci-earthquake/actions/workflows/env_vars.yml/runs?status=completed&conclusion=success")
          run_id=$(echo $response | jq '.workflow_runs[0].id')
          echo "Run ID: $run_id"
          echo "run_id=$run_id" >> $GITHUB_ENV

      - name: Download .env Artifact
        if: env.is_fork != 'true'
        uses: actions/download-artifact@v4
        with:
          name: encrypted-env-file
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: sfbrigade/datasci-earthquake
          run-id: ${{ env.run_id }}

      - name: Decrypt .env File
        if: env.is_fork != 'true'
        run: |
          openssl aes-256-cbc -d -salt -pbkdf2 -k "${{ secrets.ARTIFACT_PASS }}" -in .env.enc -out .env
          echo "Decryption complete"

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then
            echo ".env not found. Falling back to .env.example"
            cp .env.example .env
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker Containers
        run: docker compose build

      - name: Start Services
        id: start_services
        run:
        - docker compose up -d --wait --wait-timeout 300

      - name: Check health of ${{ matrix.container_name }} container
        id: check_health_${{ matrix.container_name }}
        run: |
          test_container_status=$(docker inspect --format='{{json .State.Health}}' ${{ matrix.container_name }})
          echo "Health status of ${{ matrix.container_name }}: $test_container_status" >> $GITHUB_OUTPUT

      # alternatively:
      #     healthy_containers=$(docker ps --filter "health=healthy" --format "{{.Names}}")
      #     echo "Healthy containers: $healthy_containers"


      - name: Docker logs for (${{ matrix.container_name }}) (${{ steps.check_health_${{ matrix.container_name }}.outputs.health }})
        if: always()
        run: |
          docker logs ${{ matrix.container_name }} || echo "No logs found"

      - name: Run Backend Tests
        run: docker compose run --rm backend pytest backend -v

      - name: Run Frontend Tests
        run: docker compose run --rm frontend npm test

      - name: Clean Up
        run: docker compose down
