name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop
      - main

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint


  nextjs_build_check:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ci
    steps:
      - uses: actions/checkout@v4 
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'  
      - name: Install dependencies
        run: npm ci 
      - name: Check Next.js production build
        run: npm run build
      - name: check values 
        run: |
          echo '----------postgis version A---------' 
          echo $POSTGIS_VERSION 
          echo '----------done postgis version A---------' 

  docker_build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set default fork status
        run: echo "is_fork=false" >> $GITHUB_ENV        
        run: |
          echo "is_fork=false" >> $GITHUB_ENV        

      - name: Check if pull request from fork
        id: check_fork
        if: github.event_name == 'pull_request'
        run: |
          run: |
            if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
              echo "is_fork=true" >> $GITHUB_ENV
            fi

      - name: Use .env.example for forks
        if: env.is_fork == 'true'
        run: cp .env.example .env

      - name: Get Run ID of Most Recent Successful Run
        id: get_run_id
        if: env.is_fork != 'true'
        run: |
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/sfbrigade/datasci-earthquake/actions/workflows/env_vars.yml/runs?status=completed&conclusion=success")
          run_id=$(echo $response | jq '.workflow_runs[0].id')
          echo "Run ID: $run_id"
          echo "run_id=$run_id" >> $GITHUB_ENV

      - name: Download .env Artifact
        if: env.is_fork != 'true'
        uses: actions/download-artifact@v4
        with:
          name: encrypted-env-file
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: sfbrigade/datasci-earthquake
          run-id: ${{ env.run_id }}

      - name: Decrypt .env File
        if: env.is_fork != 'true'
        run: |
          openssl aes-256-cbc -d -salt -pbkdf2 -k "${{ secrets.ARTIFACT_PASS }}" -in .env.enc -out .env
          echo "Decryption complete"

      - name: ENVIRONMENT value 
        run: |
          echo '----------postgis version---------' 
          cat .env | grep 'POSTGIS_VERSION' 
          echo '----------environment---------' 
          cat .env | grep 'ENVIRONMENT' 
          echo '----------done---------' 

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then
            echo ".env not found. Falling back to .env.example"
            cp .env.example .env
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker Containers
        run: docker compose build db

      - name: Start Services
        run: docker compose up -d --wait --wait-timeout 300 db

      - name: Docker Logs 
        if: always()  
        run: |
          docker logs my_postgis_db || echo "No logs found"

      #- name: Run Backend Tests
        # run: docker compose run --rm backend pytest backend/etl/tests/test_data_handler.py::test_dummy 
        #run: docker compose run --rm backend pytest backend/api/tests/test_liquefaction.py::test_get_liquefaction_zones 
        # run: docker compose run --rm backend pytest backend -v 


      - name: Clean Up
        run: docker compose down db
