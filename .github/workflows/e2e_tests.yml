name: E2E Tests

on:
  # Trigger 1: Automatic run after Vercel successfully deploys a PR Preview
  deployment_status: # Trigger 2: Manual run for testing the default URL

  workflow_dispatch:


jobs:
  test:
    # Only run if:
    # 1. Manually dispatched OR
    # 2. Vercel reported a successful 'Preview' deployment
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Preview')

    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # For deployment_status, checkout the exact commit Vercel deployed.
        # For manual runs, checkout the current branch reference.
        ref: ${{ github.event_name == 'deployment_status' && github.event.deployment.sha || github.ref }}

    - uses: ./.github/actions/setup-node-using-nvmrc

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright E2E Tests
      id: run_tests
      run: npm run test:e2e
      env:
        # Set BASE_URL only during automated Vercel runs (uses the dynamic URL).
        # Otherwise, set it to an empty string, forcing Playwright to use the default defined in the config (https://localhost:3000).
        BASE_URL: ${{ github.event_name == 'deployment_status' && github.event.deployment_status.target_url || '' }}

      # Continue even if the tests fail so we can upload the reports/traces
      continue-on-error: true

    - uses: actions/upload-artifact@v4
      # Upload reports regardless of success/failure
      if: ${{ always() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 1

    - name: Upload Test Results (Traces, Screenshots)
      # Upload traces only when a test fails
      if: ${{ failure() || steps.run_tests.outcome == 'failure' }}
      uses: actions/upload-artifact@v4
      with:
        name: e2e-traces-run-${{ github.run_number }}-${{ github.sha }}
        # The 'test-results' folder contains the traces, videos, and failure screenshots
        path: test-results/
        retention-days: 1
