# Docker Compose configuration for local development and CI pipeline.
# Not used for production; production is deployed via hosting platform.
services:
  db:
    image: postgis-custom
    build:
      context: ./backend/database
      dockerfile: Dockerfile
    container_name: my_postgis_db
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db_test:
    build:
      context: ./backend/database
      dockerfile: Dockerfile
    container_name: my_postgis_db_test
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    volumes:
      - ./backend/database:/docker-entrypoint-initdb.d # Mount the SQL scripts directory
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/backend:/
      - DATA_GEOJSON_PATH=/public/data/
      - ENVIRONMENT=dev_docker
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/backend
      - ./backend/etl/startup.sh:/startup.sh
      - public_data:/public/data
    command: bash /startup.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    ports:
      - 3000:3000
    depends_on:
      - backend
    volumes:
      - nextjs_cache:/app/.next
      # does NOT work: didn't create either directory
      #- /home/runner/work/datasci-earthquake/datasci-earthquake/doityourself:/app/node_modules_doityourself

      # does NOT work: create dir in Dockefile and in ci.yml
      #- /home/runner/work/datasci-earthquake/datasci-earthquake/doityourself:/app/node_modules_doityourself

      # does NOT work: same as above but with DOCKER_HOST 
      #- ${DOCKER_HOST}/home/runner/work/datasci-earthquake/datasci-earthquake/doityourself:/app/node_modules_doityourself

      # does NOT work 
      #- doityourself:/app/node_modules_doityourself

      # does NOT work 
      #- ./doityourself:/app/node_modules_doityourself

      # does NOT work: same as above but explicit 
      #- type: bind
      #  source: ${DOCKER_HOST}/home/runner/work/datasci-earthquake/datasci-earthquake/doityourself
      #  target: /app/node_modules_doityourself

      # does NOT work 
      #- type: bind
      #  source: /home/runner/work/datasci-earthquake/datasci-earthquake/node_modules
      #  target: /app/node_modules

      # does NOT work 
      #- type: bind
      #  source: ./node_modules
      #  target: /app/node_modules

      # does NOT work
