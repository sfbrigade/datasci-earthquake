# Docker Compose configuration for local development and CI pipeline.
# Not used for production; production is deployed via hosting platform.
# oppppyiiiiiiiiiwhatwhat
services:
  db:
    image: postgis-custom
    build:
      context: ./backend
      dockerfile: database/Dockerfile
      #cache_from:
      #  - type=local,src=earthquake-cache-db-sing
      #cache_to:
      #  - type=local,dest=earthquake-cache-db-sing
    container_name: mydb
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    volumes:
      - db-data:/var/lib/postgresql/data
      #- ./backend/database:/docker-entrypoint-initdb.d # Mount the SQL scripts directory
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  alembic:
    build:
      context: ./backend
      dockerfile: alembic.Dockerfile
    container_name: myalembic
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker

  db_test:
    build:
      context: ./backend/database
      dockerfile: Dockerfile
    container_name: my_postgis_db_test
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    volumes:
      - ./backend/database:/docker-entrypoint-initdb.d # Mount the SQL scripts directory
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mybackend
    env_file:
      - .env
    environment:
      - PYTHONPATH=/backend:/
      - DATA_GEOJSON_PATH=/public/data/
      - ENVIRONMENT=dev_docker
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/backend
      - public_data:/public/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      #cache_from:
      #  - type=local,src=earthquake-cache-frontend-sing
      #cache_to:
      #  - type=local,dest=earthquake-cache-frontend-sing
    container_name: myfrontend
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    ports:
      - 3000:3000
    depends_on:
      - backend
    volumes:
      - .:/app:rw,delegated # Mount after dependencies are installed
      #- /app/node_modules # This excludes the node_modules from being overwritten
      - nextjs_cache:/app/.next
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

volumes:
  db-data:
  nextjs_cache:
  public_data:
