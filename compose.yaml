      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

volumes:
  db-data:
  nextjs_cache:
  public_data:
