# Docker Compose configuration for local development and CI pipeline.
# Not used for production; production is deployed via hosting platform.

services:
  db:
    image: postgis-custom
    build:
      context: ./backend/database
      dockerfile: Dockerfile
    container_name: my_postgis_db
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db_test:
    build:
      context: ./backend/database
      dockerfile: Dockerfile
    container_name: my_postgis_db_test
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    volumes:
      - ./backend/database:/docker-entrypoint-initdb.d # Mount the SQL scripts directory
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/backend:/
      - DATA_GEOJSON_PATH=/public/data/
      - ENVIRONMENT=dev_docker
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/backend
      - ./backend/etl/startup.sh:/startup.sh
      - public_data:/public/data
    command: bash /startup.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    env_file:
      - .env
    environment:
      - ENVIRONMENT=dev_docker
    ports:
      - 3000:3000
    depends_on:
      - backend
    working_dir: /app/apps/next-app
    volumes:
      - .:/app:rw,delegated # mount whole monorepo to /app after dependencies are installed
      - /app/node_modules # prevent local root node_modules from being overwritten by host
      - /app/apps/web/node_modules # in case node_modules also ends up inside app folder, prevent that from being overwritten by host too; also prevents local Storybook cache from messing with container
      - nextjs_cache:/app/apps/web/.next # Next build cache stored in a separate volume to prevent it from being overwritten by host and to improve performance
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

volumes:
  db-data:
  nextjs_cache:
  public_data:
